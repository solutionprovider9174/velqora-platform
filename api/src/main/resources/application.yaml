spring:
  application:
    name: velqora-platform-api

  datasource:
    url: jdbc:postgresql://localhost:5432/velqora_db
    username: velqora_user
    password: velqora_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

velqora:
  jwt:
    secret: "velqora-local-development-secret-key-change-before-production-123456"
    expiration-minutes: 120

  bootstrap:
    admin-email: "admin@velqora.com"
    admin-password: "Admin@12345"